<style>
:root { --sand:#EEF3F8; --warm:#F5F8FB; --mid:#5a6272; --light:#8e97a8; }
body { background: var(--warm); }

.ty-page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.ty-main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 9rem 2rem 6rem;
  background: var(--navy);
  position: relative;
  overflow: hidden;
}

.ty-main::before {
  content: '';
  position: absolute;
  top: -160px; right: -160px;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(61,166,205,.1), transparent 65%);
  pointer-events: none;
}
.ty-main::after {
  content: '';
  position: absolute;
  bottom: -100px; left: 5%;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(26,58,92,.4), transparent 65%);
  pointer-events: none;
}

.ty-card {
  max-width: 600px;
  width: 100%;
  text-align: center;
  position: relative;
  z-index: 1;
  animation: fadeUp .7s ease forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: none; }
}

.ty-check {
  width: 64px;
  height: 64px;
  background: rgba(61,166,205,.14);
  border: 1px solid rgba(61,166,205,.3);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 2rem;
}

.ty-label {
  font-family: 'Epilogue', sans-serif;
  font-weight: 700;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--teal);
  font-size: 13px;
  display: block;
  margin-bottom: 1.25rem;
}

.ty-h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.4rem, 4vw, 3.6rem);
  line-height: 1.08;
  color: white;
  margin-bottom: 1.5rem;
}

.ty-h1 em {
  font-style: italic;
  color: var(--teal);
}

.ty-body {
  font-size: 1rem;
  line-height: 1.85;
  color: rgba(255,255,255,.72);
  font-weight: 300;
  margin-bottom: 2.75rem;
  font-family: 'Epilogue', sans-serif;
}

.ty-divider {
  width: 40px;
  height: 1px;
  background: rgba(255,255,255,.15);
  margin: 0 auto 2.75rem;
}

.ty-back {
  font-family: 'Epilogue', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: rgba(255,255,255,.45);
  text-decoration: none;
  letter-spacing: .04em;
  transition: color .2s;
  display: inline-flex;
  align-items: center;
  gap: .4rem;
}
.ty-back:hover { color: rgba(255,255,255,.75); }
.ty-back svg { transition: transform .2s; }
.ty-back:hover svg { transform: translateX(-3px); }

@media (max-width: 560px) {
  .ty-main { padding: 8rem 1.5rem 5rem; }
}
</style>

      We review every application personally. If your background looks like a strong fit for what we're working on, we'll be in touch to schedule a conversation.
