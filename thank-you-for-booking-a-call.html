<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call Booked — Blue Engine Solutions</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" href="/brand.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
body { background: var(--bg); display: flex; flex-direction: column; min-height: 100vh; }
.ty-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 6rem 2rem;
}
.ty-card {
  background: white;
  border-radius: 16px;
  border: 1px solid var(--border-light);
  box-shadow: var(--shadow-soft);
  padding: 3.5rem 3rem;
  max-width: 520px;
  width: 100%;
  text-align: center;
}
.ty-icon {
  width: 56px;
  height: 56px;
  background: rgba(43, 140, 174, 0.1);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 1.75rem;
}
.ty-icon svg { color: var(--teal-deep); }
.ty-eyebrow {
  font-family: 'Epilogue', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--teal-deep);
  display: block;
  margin-bottom: 0.75rem;
}
.ty-heading {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  color: var(--navy);
  line-height: 1.15;
  margin-bottom: 1rem;
}
.ty-body {
  font-size: 15px;
  line-height: 1.8;
  color: var(--ink-mid);
  font-weight: 300;
  margin-bottom: 2rem;
}
.ty-home-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  background: var(--navy);
  color: white;
  font-family: 'Epilogue', sans-serif;
  font-size: 14px;
  font-weight: 600;
  padding: 11px 24px;
  border-radius: 100px;
  text-decoration: none;
  transition: background 0.2s, transform 0.15s;
}
.ty-home-btn:hover {
  background: var(--royal);
  transform: translateY(-1px);
}
</style>
</head>
<body>

<div id="site-nav"></div>
<script src="/nav.js"></script>

<div class="ty-wrap">
  <div class="ty-card">
    <div class="ty-icon">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
    </div>
    <span class="ty-eyebrow">Meeting Confirmed</span>
    <h1 class="ty-heading">You're on the calendar.</h1>
    <p class="ty-body">Check your inbox for a confirmation with all the details. We're looking forward to the conversation — see you soon.</p>
    <a href="/" class="ty-home-btn">
      Back to Home
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2.5 7h9M7.5 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
  </div>
</div>

<div id="site-footer"></div>
<script src="/footer.js"></script>
</body>
</html>
